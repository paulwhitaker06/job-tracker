name: Daily Job Check

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          pip install requests pyyaml beautifulsoup4 playwright
          python -m playwright install --with-deps chromium

      - name: Run script
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python check_jobs.py

      - name: Commit updated memory files
        run: |
          git config user.name "job-tracker-bot"
          git config user.email "job-tracker-bot@users.noreply.github.com"
          git add seen_jobs.json latest_digest.txt || true
          git diff --staged --quiet || git commit -m "Update seen jobs"
          git push
